<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>pMHC / TCR-pMHC PDB search — __TITLE__</title>
<style>
  :root {
    --bg: #fafafa; --fg: #1a1a1a; --muted: #6a6a6a;
    --border: #d8d8d8; --hover: #f0f4ff;
    --tcr: #c0392b; --pmhc: #2980b9; --rep: #27ae60;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
         margin: 32px auto; max-width: 1280px; padding: 0 24px;
         background: var(--bg); color: var(--fg); line-height: 1.5; }
  h1 { margin: 0 0 4px; font-size: 1.6em; }
  .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 0.9em; }
  h2 { margin-top: 36px; border-bottom: 2px solid var(--border); padding-bottom: 6px; font-size: 1.15em; }
  .epitope-meta { color: var(--muted); font-size: 0.85em; margin-bottom: 12px; }
  .summary { background: white; border: 1px solid var(--border); border-radius: 6px;
             padding: 10px 14px; margin: 8px 0 16px; display: flex; gap: 20px; flex-wrap: wrap; }
  .summary div { font-size: 0.9em; }
  .summary strong { color: var(--fg); }
  table { width: 100%; border-collapse: collapse; font-size: 0.85em; background: white;
          border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  th, td { padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--border);
           vertical-align: top; }
  th { background: #efefef; cursor: pointer; user-select: none; font-weight: 600;
       position: sticky; top: 0; }
  th:hover { background: #e5e5e5; }
  th::after { content: ''; display: inline-block; margin-left: 6px; opacity: 0.4; }
  th.sorted-asc::after { content: '\25B2'; opacity: 1; }
  th.sorted-desc::after { content: '\25BC'; opacity: 1; }
  tr:hover td { background: var(--hover); }
  .tag { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 0.78em;
         font-weight: 600; white-space: nowrap; }
  .tag-tcr { background: #fbe6e3; color: var(--tcr); }
  .tag-pmhc { background: #e3edf7; color: var(--pmhc); }
  .tag-rep { background: #e3f5e7; color: var(--rep); }
  .tag-dup { background: #f0f0f0; color: var(--muted); }
  .tag-classI { background: #fff4e0; color: #b86a00; }
  .tag-classII { background: #ece2f5; color: #6d3f9c; }
  a { color: #1665c1; text-decoration: none; }
  a:hover { text-decoration: underline; }
  code { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 0.93em;
         background: #f0f0f0; padding: 1px 5px; border-radius: 3px; }
  .files a { margin-right: 8px; }
  .caveats { margin-top: 40px; padding: 12px 16px; background: #fff8e1; border: 1px solid #f5e1a4;
             border-radius: 6px; font-size: 0.9em; }
  .caveats h3 { margin-top: 0; }
  .footer { color: var(--muted); font-size: 0.8em; margin-top: 50px; text-align: center;
            border-top: 1px solid var(--border); padding-top: 14px; }
</style>
</head>
<body>

<h1>pMHC / TCR-pMHC PDB search</h1>
<div class="subtitle">__SUBTITLE__</div>

__BODY__

__CAVEATS__

<div class="footer">
  Generated by <code>pdb-pmhc-tcr-search</code> &middot; RCSB Search API v2 &middot;
  click any column header to sort
</div>

<script>
// Tiny inline-only column sorter — no external deps. Click a TH to sort by that column;
// click again to reverse. Numeric columns auto-detected by trying to parseFloat the cell.
document.querySelectorAll('table').forEach(function(table) {
  table.querySelectorAll('th').forEach(function(th, idx) {
    th.addEventListener('click', function() {
      var tbody = table.querySelector('tbody');
      if (!tbody) return;
      var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
      var asc = !th.classList.contains('sorted-asc');
      table.querySelectorAll('th').forEach(function(o) {
        o.classList.remove('sorted-asc'); o.classList.remove('sorted-desc');
      });
      th.classList.add(asc ? 'sorted-asc' : 'sorted-desc');
      var numeric = rows.every(function(r) {
        var t = (r.children[idx] || {}).innerText || '';
        return t.trim() === '' || !isNaN(parseFloat(t));
      });
      rows.sort(function(a, b) {
        var av = (a.children[idx] || {}).innerText || '';
        var bv = (b.children[idx] || {}).innerText || '';
        if (numeric) {
          var an = parseFloat(av), bn = parseFloat(bv);
          if (isNaN(an)) an = Infinity; if (isNaN(bn)) bn = Infinity;
          return asc ? an - bn : bn - an;
        }
        return asc ? av.localeCompare(bv) : bv.localeCompare(av);
      });
      rows.forEach(function(r) { tbody.appendChild(r); });
    });
  });
});
</script>

</body>
</html>
